    <style>
        /* ============================================================
           Works 页面 — 模拟电脑桌面
           ============================================================ */
        body.works-page {
            background: #000;
            margin: 0;
            overflow: hidden;
        }

        /* 过渡动画黑幕（首页点击 Works 时展开，works 页面加载后负责淡出） */
        #transition-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: #000;
            z-index: 999;
            /* 入场：黑幕保持 100ms 后开始淡出，屏幕渐亮 */
            opacity: 1;
            transition: opacity 0.5s ease;
        }

        /* WebGL canvas — 鼠标效果层 */
        #webgl-canvas {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        /* CRT 效果叠层 */
        .crt-overlay {
            position: fixed;
            inset: 0;
            z-index: 20;
            pointer-events: none;
        }
        .crt-scanlines {
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                to bottom,
                transparent 0px,
                transparent 3px,
                rgba(0, 0, 0, 0.14) 3px,
                rgba(0, 0, 0, 0.14) 4px
            );
        }
        .crt-scan-beam {
            position: absolute;
            left: 0;
            right: 0;
            height: 80px;
            background: linear-gradient(
                to bottom,
                transparent 0%,
                rgba(180, 220, 200, 0.03) 40%,
                rgba(180, 220, 200, 0.06) 50%,
                rgba(180, 220, 200, 0.03) 60%,
                transparent 100%
            );
            animation: scanBeam 6s linear infinite;
            top: -80px;
        }
        @keyframes scanBeam {
            0%   { top: -80px; }
            100% { top: 100%; }
        }
        .crt-vignette {
            position: absolute;
            inset: 0;
            background: radial-gradient(
                ellipse at center,
                transparent 55%,
                rgba(0, 0, 0, 0.65) 100%
            );
        }
        @keyframes flicker {
            0%, 100% { opacity: 1; }
            92% { opacity: 1; }
            93% { opacity: 0.94; }
            94% { opacity: 1; }
            97% { opacity: 0.97; }
        }
        .crt-overlay {
            animation: flicker 5s infinite;
        }

        /* ============================================================
           电脑屏幕容器
           ============================================================ */
        .computer-screen {
            position: fixed;
            top: 90px;
            left: 40px;
            right: 40px;
            bottom: 40px;
            background: #757575;
            border-radius: 14px;
            z-index: 5;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            /* 展开动画 */
            clip-path: circle(3px at 56.6% 39.0%);
            animation: screenExpand 0.5s cubic-bezier(0.4,0,0.2,1) 0.05s forwards;
        }

        @keyframes screenExpand {
            from { clip-path: circle(3px at 56.6% 39.0%); }
            to   { clip-path: none; }
        }

        /* ============================================================
           状态栏
           ============================================================ */
        .screen-titlebar {
            flex-shrink: 0;
            height: 32px;
            background: #DDDDDD;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            user-select: none;
        }

        /* 状态栏左区：Logo + 菜单项 */
        .titlebar-left {
            display: flex;
            align-items: center;
            gap: 0;
        }

        .titlebar-logo {
            width: 26px;
            height: 20px;
            margin-right: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .titlebar-logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .titlebar-menu {
            display: flex;
            align-items: center;
        }

        /* 详情视图标题栏 */
        .detail-titlebar {
            flex-shrink: 0;
            height: 32px;
            background: #DDDDDD;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            user-select: none;
        }
        .detail-titlebar.hidden,
        .desktop-titlebar.hidden {
            display: none;
        }
        .detail-title-name {
            font-family: 'FLYNN Mono', monospace;
            font-size: 11px;
            color: #000;
            letter-spacing: 0.5px;
        }
        .detail-close-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: default;
            font-family: 'FLYNN Mono', monospace;
            font-size: 11px;
            color: #000;
            letter-spacing: 0.5px;
            padding: 2px 4px;
            border-radius: 2px;
            transition: background 0.15s;
        }
        .detail-close-btn:hover {
            background: rgba(0,0,0,0.12);
        }

        /* ============================================================
           Info 弹窗
           ============================================================ */
        .info-popup-overlay {
            position: absolute;
            inset: 0;
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.4);
        }
        .info-popup-overlay.active {
            display: flex;
        }

        /* 数独弹窗用 fixed，覆盖整个屏幕 */
        #sudoku-popup {
            position: fixed !important;
            inset: 0;
            z-index: 300;
            background: rgba(0,0,0,0.55);
        }
        .info-popup {
            background: #DDDDDD;
            border-radius: 8px;
            width: 580px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 4px 24px rgba(0,0,0,0.5);
        }
        .info-popup-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 12px;
            height: 28px;
            background: #EEEEEE;

        }
        .info-popup-title {

            font-size: 11px;

        }
        .info-popup-close {

        .info-popup-shadow {

            background: #000;

        /* 图片 */

            width: 100%;
            max-width: 600px;
            display: block;
            margin: 0 0 24px;
            border-radius: 4px;
        }

        /* 图标网格 */
        .icon-grid {
            position: absolute;
            inset: 0;
            z-index: 2;
            display: flex;
            flex-direction: column;
            flex-wrap: wrap;
            align-content: flex-start;
            gap: 28px 40px;
            padding: 24px 28px;
        }

        /* 单个图标 */
        .icon-item {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 6px;
            cursor: default;
            padding: 4px;
            border-radius: 4px;
            transition: background 0.1s;
            flex-shrink: 0;
            width: 90px;
            height: 100px;
        }

        .icon-item.selected {
            background: rgba(0, 0, 0, 0.3);
        }

        .icon-item img {
            width: 48px;
            height: 48px;
            object-fit: contain;
            display: block;
            margin: 0 auto;
        }

        .icon-item span {
            font-family: 'FLYNN Mono', monospace;
            font-size: 10px;
            color: #fff;
            text-shadow: 1px 1px 0 #000;
            text-align: center;
            line-height: 1.3;
            word-break: break-word;
            max-width: 86px;
            width: 100%;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }

        /* ============================================================
           图标入场动画（黑幕淡出后依次弹出）
           ============================================================ */
        @keyframes iconPop {
            0%   { opacity: 0; transform: scale(0.6); }
            70%  { opacity: 1; transform: scale(1.08); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* 初始状态：不可见，等黑幕淡出后才动画 */
        .icon-item {
            opacity: 0;
        }

        /* 6 个图标依次弹出，间隔 100ms */
        .icon-item:nth-child(1) { animation: iconPop 0.28s cubic-bezier(0.34, 1.56, 0.64, 1) 0.60s forwards; }
        .icon-item:nth-child(2) { animation: iconPop 0.28s cubic-bezier(0.34, 1.56, 0.64, 1) 0.70s forwards; }
        .icon-item:nth-child(3) { animation: iconPop 0.28s cubic-bezier(0.34, 1.56, 0.64, 1) 0.80s forwards; }
        .icon-item:nth-child(4) { animation: iconPop 0.28s cubic-bezier(0.34, 1.56, 0.64, 1) 0.90s forwards; }
        .icon-item:nth-child(5) { animation: iconPop 0.28s cubic-bezier(0.34, 1.56, 0.64, 1) 1.00s forwards; }
        .icon-item:nth-child(6) { animation: iconPop 0.28s cubic-bezier(0.34, 1.56, 0.64, 1) 1.10s forwards; }
        .icon-item:nth-child(7) { animation: iconPop 0.28s cubic-bezier(0.34, 1.56, 0.64, 1) 1.20s forwards; }
        .icon-item:nth-child(8) { animation: iconPop 0.28s cubic-bezier(0.34, 1.56, 0.64, 1) 1.30s forwards; }

        /* ============================================================
           移动端适配
           ============================================================ */
        @media (max-width: 768px) {
            .computer-screen {
                top: 80px;
                left: 20px;
                right: 20px;
                bottom: 20px;
                border-radius: 10px;
            }
            .titlebar-menu span {
                padding: 3px 20px;
                font-size: 11px;
            }
        }
    </style>

    <!-- 实时时钟 -->
    <script>
        (function () {
            function updateClock() {
                const now = new Date();
                const h = String(now.getHours()).padStart(2, '0');
                const m = String(now.getMinutes()).padStart(2, '0');
                const s = String(now.getSeconds()).padStart(2, '0');
                const el = document.getElementById('titlebar-clock');
                if (el) el.textContent = `${h}:${m}:${s}`;
            }
            updateClock();
            setInterval(updateClock, 1000);
        })();
    </script>

    <!-- 噪波马赛克效果 -->
    <script>
        (function () {
            const canvas = document.getElementById('noise-canvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');

            function resize() {
                const rect = canvas.parentElement.getBoundingClientRect();
                canvas.width  = rect.width;
                canvas.height = rect.height;
                drawNoise();
            }

            function drawNoise() {
                const w = canvas.width;
                const h = canvas.height;
                const imageData = ctx.createImageData(w, h);
                const data = imageData.data;
                const base = 117; // #757575 的灰度

                for (let i = 0; i < data.length; i += 4) {
                    const noise = (Math.random() - 0.5) * 40;
                    const val = Math.max(0, Math.min(255, Math.round(base + noise)));
                    data[i]     = val;       // R
                    data[i + 1] = val;       // G
                    data[i + 2] = val;       // B
                    data[i + 3] = 255;       // A
                }
                ctx.putImageData(imageData, 0, 0);
            }

            // 页面加载后生成一次静态噪波
            window.addEventListener('load', () => {
                resize();
            });

            window.addEventListener('resize', () => {
                resize();
            });
        })();

        // 淡化首页过渡动画的黑幕

            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    overlay.style.opacity = '0';
                    setTimeout(() => { overlay.style.display = 'none'; }, 600);
                });
            });
        })();

                    body: 'An operating system interface concept for personal productivity. Built with web technologies, it simulates a complete desktop environment with draggable windows, a taskbar, and a start menu.',
                    desc: 'Role: Sole designer & developer · Platform: Web (Electron)',
                    images: []
                },
                'dingtalk': {
                    title: 'Dingtalk',
                    subtitle: 'Enterprise Communication · 2017 — 2019',
                    body: 'Designed UI components and interaction patterns for Alibaba\'s enterprise communication platform, serving millions of users across multiple devices.',
                    desc: 'Role: UI Designer · Team: Alibaba Design',
                    images: []
                },
                'blink': {
                    title: 'Blink',
                    subtitle: 'Design System · 2015 — 2017',
                    body: 'A comprehensive design system created to unify visual language across multiple products. Includes over 200 components, a full icon set, and detailed usage guidelines.',
                    desc: 'Role: Lead Designer',
                    images: []
                },
                'aidesign': {
                    title: 'AI Design',
                    subtitle: 'Generative Design Tool',
                    body: 'An experimental tool exploring the intersection of AI and traditional graphic design workflows.',
                    desc: 'Role: Concept, Design & Development',
                    images: []
                },
                'leadership': {
                    title: 'Leadership',
                    subtitle: 'Design Leadership',
                    body: 'A collection of materials and frameworks developed while leading design teams, covering hiring, mentorship, and process design.',
                    desc: 'Context: Design Management',
                    images: []
                },
                'thisweb': {
                    title: 'About This Website',
                    subtitle: 'Portfolio Site',
                    body: 'The site you\'re browsing right now — a personal portfolio built from scratch, featuring custom CRT effects, a retro desktop metaphor, and smooth micro-interactions.',
                    desc: 'Built with: HTML · CSS · JS · Three.js',
                    images: []
                }
            };

            // ============================================================
            // 元素引用
            // ============================================================
            const desktopTitlebar = document.getElementById('desktop-titlebar');
            const detailTitlebar  = document.getElementById('detail-titlebar');
            const detailTitleName = document.getElementById('detail-title-name');
            const iconGrid       = document.getElementById('icon-grid');
            const detailView     = document.getElementById('detail-view');
            const detailContent  = document.getElementById('detail-content');
            const closeBtn       = document.getElementById('detail-close-btn');

            // ============================================================
            // 打开详情
            // ============================================================
            function openDetail(id) {
                const work = WORKS[id];
                if (!work) return;

                // 填充标题
                detailTitleName.textContent = work.title;

                // 渲染内容
                let html = '';
                html += `<h1 class="d-title">${work.title}</h1>`;
                html += `<p class="d-subtitle">${work.subtitle}</p>`;
                html += `<p class="d-body">${work.body}</p>`;
                html += `<p class="d-desc">${work.desc}</p>`;
                work.images.forEach(src => {
                    html += `<img class="d-img" src="${src}" alt="">`;
                });
                detailContent.innerHTML = html;

                // 切换视图
                desktopTitlebar.classList.add('hidden');
                detailTitlebar.classList.remove('hidden');
                iconGrid.style.display  = 'none';
                detailView.classList.add('active');

                // 滚动到顶部
                detailContent.scrollTop = 0;
            }

            // ============================================================
            // 关闭详情
            // ============================================================
            function closeDetail() {
                detailView.classList.remove('active');
                detailTitlebar.classList.add('hidden');
                iconGrid.style.display  = '';
                desktopTitlebar.classList.remove('hidden');
            }

            closeBtn.addEventListener('click', closeDetail);

            // ============================================================
            // Info 弹窗
            // ============================================================
            const infoLogoBtn = document.getElementById('info-logo-btn');
            const infoPopup   = document.getElementById('info-popup');
            const infoCloseBtn = document.getElementById('info-close-btn');

            function openInfoPopup() {
                infoPopup.classList.add('active');
            }
            function closeInfoPopup() {
                infoPopup.classList.remove('active');
            }

            if (infoLogoBtn) infoLogoBtn.addEventListener('click', openInfoPopup);
            if (infoCloseBtn) infoCloseBtn.addEventListener('click', closeInfoPopup);
            if (infoPopup) {
                infoPopup.addEventListener('click', (e) => {
                    if (e.target === infoPopup) closeInfoPopup();
                });
            }

            // ============================================================
            // 图标网格事件
            // ============================================================
            iconGrid.addEventListener('click', (e) => {
                const item = e.target.closest('.icon-item');
                if (!item) {
                    iconGrid.querySelectorAll('.icon-item').forEach(el => el.classList.remove('selected'));
                    return;
                }
                iconGrid.querySelectorAll('.icon-item').forEach(el => el.classList.remove('selected'));
                item.classList.add('selected');
            });

            iconGrid.addEventListener('dblclick', (e) => {
                const item = e.target.closest('.icon-item');
                if (!item) return;
                const id = item.dataset.work;
                const url = item.dataset.url;
                // 如果有外部链接，新标签页打开
                if (url) {
                    window.open(url, '_blank');
                    return;
                }
                if (id) openDetail(id);
            });
        })();
    </script>

</body>
