<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>练习中 - FPS Buddy</title>
  <link rel="icon" href="images/FPSLogo.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/training.css">
</head>
<body class="training-page no-select">
  <!-- 游戏画布 -->
  <canvas id="gameCanvas"></canvas>

  <!-- 效果容器 -->
  <div id="effectsContainer"></div>

  <!-- HUD -->
  <div class="hud">
    <div class="hud-top">
      <!-- 左侧按钮组 -->
      <div class="hud-left">
        <button class="hud-btn" id="backBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
          </svg>
        </button>
        <button class="hud-btn" id="pauseBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <rect x="6" y="4" width="4" height="16"/>
            <rect x="14" y="4" width="4" height="16"/>
          </svg>
        </button>
      </div>

      <!-- 中间倒计时 -->
      <div class="hud-center">
        <div class="timer-display" id="timer">1:00</div>
      </div>

      <!-- 右侧统计 -->
      <div class="hud-right">
        <div class="stat-btn">
          <span class="stat-value hits" id="hitsCount">0</span>
        </div>
        <div class="stat-btn">
          <span class="stat-value misses" id="missesCount">0</span>
        </div>
      </div>
    </div>
  </div>

  <!-- 开始界面 -->
  <div class="start-screen" id="startScreen">
    <!-- 左上角返回按钮 -->
    <a href="index.html" class="start-back-btn" title="返回首页">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9,22 9,12 15,12 15,22"/>
      </svg>
    </a>

    <!-- 认真练枪模式：场地选择 -->
    <div class="mode-screen" id="seriousModeScreen">
      <h1 class="mode-title">认真练枪</h1>
      <p class="mode-subtitle">选择场地</p>

      <!-- 场地选择 -->
      <div class="venue-selector" id="seriousVenueSelector">
        <div class="venue-card selected" data-venue="0">
          <img src="images/zombieBG.webp" alt="僵尸场地" class="venue-image">
        </div>
        <div class="venue-card" data-venue="1">
          <img src="images/guiltystreet.webp" alt="街头场地" class="venue-image">
        </div>
        <div class="venue-card" data-venue="2">
          <img src="images/ufo.webp" alt="UFO场地" class="venue-image">
        </div>
      </div>

      <!-- 开始按钮 -->
      <button class="btn btn-primary btn-lg start-btn" data-mode="serious">
        开始练习
      </button>

      <!-- 提示文字 -->
      <p class="tips-text">点击场地开始练习</p>
    </div>

    <!-- 摸鱼练枪模式：场地选择 -->
    <div class="mode-screen hidden" id="casualModeScreen">
      <h1 class="mode-title">摸鱼练枪</h1>
      <p class="mode-subtitle">选择场地</p>

      <!-- 场地选择 -->
      <div class="venue-selector" id="casualVenueSelector">
        <div class="venue-card selected" data-venue="0">
          <img src="images/fake1.webp" alt="场地1" class="venue-image">
        </div>
        <div class="venue-card" data-venue="1">
          <img src="images/fake3.webp" alt="场地2" class="venue-image">
        </div>
        <div class="venue-card upload-card" data-venue="2" id="uploadCard">
          <img src="" alt="" class="venue-image" id="uploadPreview" style="display:none;">
          <div class="upload-placeholder" id="uploadPlaceholder">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="12" y1="5" x2="12" y2="19"/>
              <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            <span>上传图片</span>
          </div>
          <input type="file" id="uploadInput" accept="image/*" style="display:none;">
        </div>
      </div>

      <!-- 开始按钮 -->
      <button class="btn btn-primary btn-lg start-btn" data-mode="casual">
        开始练习
      </button>

      <!-- 提示文字 -->
      <p class="tips-text">点击场地开始练习</p>
    </div>

    <!-- 无限模式：直接开始，无需选择 -->
  </div>

  <!-- 暂停菜单 -->
  <div class="pause-menu" id="pauseMenu">
    <h2>已暂停</h2>
    <div class="pause-actions">
      <button class="btn btn-primary btn-lg pause-btn-main" id="resumeBtn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <polygon points="5,3 19,12 5,21"/>
        </svg>
        继续练习
      </button>
      <button class="btn pause-btn-secondary" id="restartBtn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M1 4v6h6M23 20v-6h-6"/>
          <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/>
        </svg>
        重新设置
      </button>
      <button class="btn pause-btn-secondary" id="endBtn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        </svg>
        返回首页
      </button>
    </div>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/config.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/evaluation.js"></script>
  <script src="js/training-core.js"></script>
</body>
</html>
