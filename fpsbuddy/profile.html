<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>个人中心 - FPS Buddy</title>
  <link rel="icon" href="images/FPSLogo.png" type="image/png">
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/profile.css">
</head>
<body class="profile-page">
  <div class="profile-container">
    <!-- 顶部导航 -->
    <header class="profile-nav">
      <a href="index.html" class="btn btn-secondary btn-back">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        返回首页
      </a>
    </header>

    <!-- 统计概览 -->
    <section class="stats-overview">
      <div class="overview-card">
        <div class="overview-value primary" id="totalSessions">0</div>
        <div class="overview-label">练习次数</div>
      </div>
      <div class="overview-card">
        <div class="overview-value secondary" id="totalTime">0</div>
        <div class="overview-label">累计时长(分钟)</div>
      </div>
      <div class="overview-card">
        <div class="overview-value" id="bestAccuracy">0%</div>
        <div class="overview-label">最高命中率</div>
      </div>
      <div class="overview-card">
        <div class="overview-value accent" id="fastestReaction">--</div>
        <div class="overview-label">最快反应(ms)</div>
      </div>
    </section>

    <!-- 勋章 -->
    <section class="badges-section">
      <div class="section-header">
        <h2 class="section-title">成就勋章</h2>
      </div>
      <div class="badges-grid" id="badgesGrid"></div>
    </section>

    <!-- 练习记录 -->
    <section class="records-section">
      <div class="section-header">
        <h2 class="section-title">练习记录</h2>
      </div>
      <div class="records-list" id="recordsList">
        <div class="empty-state">
          <div class="empty-icon">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
            </svg>
          </div>
          <p>还没有练习记录</p>
          <p class="text-muted">开始你的第一次练习吧！</p>
        </div>
      </div>
      <div class="records-actions">
        <button class="btn btn-ghost" id="clearBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="3,6 5,6 21,6"/>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
          </svg>
          清除数据
        </button>
      </div>
    </section>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/config.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/profile.js"></script>
</body>
</html>
